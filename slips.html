<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit Transfer | Collage Dashboard</title>
    <link rel="stylesheet" href="css/slips.css?v=11">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon/favicon-16x16.png">
    <link rel="manifest" href="img/favicon/site.webmanifest">
    <link rel="shortcut icon" href="img/favicon/favicon.ico">
</head>

<body>
    <div class="app-wrapper">
        <header>
            <div class="header-left">
                <h1><i class="fas fa-bolt"></i> Bit Transfer</h1>
            </div>
            <div class="header-right">
                <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Home</a>
            </div>
        </header>

        <main class="workbench-layout">
            <div class="workbench-container fade-in">
                <!-- Toolbar -->
                <div class="workbench-toolbar">
                    <div class="toolbar-group">
                        <div class="dropdown-wrapper">
                            <select id="feature-selector" class="mode-select-minimal">
                                <option value="mask">Watermark Removal</option>
                                <option value="template" selected>Custom Template</option>
                            </select>
                            <i class="fas fa-chevron-down dropdown-icon-minimal"></i>
                        </div>
                    </div>

                    <div class="toolbar-group" id="library-container">
                        <!-- Templates will be injected here -->
                    </div>

                    <div class="toolbar-group actions-group">
                        <button id="configure-mask-btn" class="toolbar-btn secondary" title="Mark areas on image"><i class="fas fa-vector-square"></i> <span>Mark Areas</span></button>
                        <button id="upload-final-btn" class="toolbar-btn primary hidden" title="Step 2: Add a new finalized template"><i class="fas fa-plus-circle"></i> <span>+ New Template</span></button>
                        <button id="clear-all-btn" class="toolbar-btn danger-minimal" title="Reset Workspace"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>

                <!-- Main Content Area -->
                <div class="workbench-body" id="dropzone">
                    <input type="file" id="file-input" multiple accept="image/*" class="hidden-input">
                    <input type="file" id="ref-input" accept="image/*" class="hidden-input">
                    <input type="file" id="final-template-input" accept="image/*" class="hidden-input">
                    
                    <!-- Empty State -->
                    <div id="empty-state" class="empty-state-workbench">
                        <div class="empty-content">
                            <i class="fas fa-cloud-upload-alt upload-icon-big"></i>
                            <h2>Ready to start?</h2>
                            <p>Drag images here or use the toolbar buttons</p>
                            <div class="empty-actions">
                                <button id="mobile-paste-btn" class="browse-btn"><i class="fas fa-paste"></i> Paste from Clipboard</button>
                                <label for="file-input" class="browse-btn secondary-btn">Browse Files</label>
                            </div>
                        </div>
                    </div>

                    <!-- Collage Preview -->
                    <div id="result-container" class="result-display hidden">
                        <div class="result-display-header">
                            <h3>Collage Preview</h3>
                            <a id="download-btn" class="action-btn success-btn" download="slips-collage.png"><i class="fas fa-download"></i> Download PNG</a>
                        </div>
                        <div class="canvas-viewport">
                            <canvas id="collage-canvas"></canvas>
                        </div>
                        <p class="copy-hint"><i class="fas fa-info-circle"></i> Long press the image to copy</p>
                    </div>

                    <!-- Mask Configurator -->
                    <div id="mask-config-container" class="mask-editor hidden">
                        <div class="mask-editor-header">
                            <div class="editor-title">
                                <h3><span id="editor-mode-text">Mark Areas to Cover</span> <span id="image-dims" class="dims-badge"></span></h3>
                                <p id="editor-subtext">Drag on image to mark areas for white boxes</p>
                            </div>
                            <div class="editor-actions">
                                <button id="mask-all-btn" class="action-btn secondary-btn hidden" title="Cover entire image"><i class="fas fa-fill-drip"></i> <span>Mask All</span></button>
                                <button id="copy-ref-btn" class="action-btn secondary-btn hidden" title="Copy to clipboard"><i class="fas fa-copy"></i> <span>Copy</span></button>
                                <button id="download-ref-btn" class="action-btn success-btn hidden" title="Download image"><i class="fas fa-download"></i> <span>Download</span></button>
                                <button id="clear-masks-btn" class="action-btn danger-minimal"><i class="fas fa-eraser"></i> <span>Clear</span></button>
                                <button id="save-masks-btn" class="action-btn success-btn"><i class="fas fa-check-circle"></i> <span>Apply</span></button>
                                <button id="cancel-mask-btn" class="action-btn secondary-btn"><span>Cancel</span></button>
                            </div>
                        </div>
                        <div class="editor-viewport">
                            <canvas id="mask-canvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/slips.js?v=11"></script>
</body>

</html>
